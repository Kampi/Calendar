[platformio]
src_dir = main
default_envs = debug

[env]
platform = espressif32
framework = espidf

platform_packages =

extra_scripts =
    scripts/format.py

build_flags =

lib_deps =

board = esp32-s3-devkitm-1
board_build.flash_mode = dio
board_build.psram_type = opi
board_build.extra_flags = -DBOARD_HAS_PSRAM
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.embed_txtfiles =
    LICENSE

debug_tool = esp-builtin
debug_port = ${sysenv.PIO_DEBUG_PORT, /dev/ttyACM0}

upload_speed = 921600
upload_port = ${sysenv.PIO_UPLOAD_PORT, /dev/ttyACM0}

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = ${sysenv.PIO_UPLOAD_PORT, /dev/ttyACM0}

[env:debug]
build_type = debug
build_flags =
    ${env.build_flags}
    -D DEBUG

lib_deps =
    ${env.lib_deps}

extra_scripts =
    ${env.extra_scripts}

[env:release]
build_type = release
build_flags =
    ${env.build_flags}
    -D NDEBUG

lib_deps =
    ${env.lib_deps}

extra_scripts =
    ${env.extra_scripts}